name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verification:
    uses: ./.github/workflows/verify.yml

  # Preserve the required `test` status-check name while making it represent
  # the complete shared verification suite.
  test:
    needs: verification
    runs-on: ubuntu-latest
    steps:
      - run: echo "All verification jobs passed."
